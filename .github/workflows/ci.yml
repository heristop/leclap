name: Continuous Integration

on: [push, pull_request, workflow_dispatch]

jobs:
  build-and-test:
    name: Run Lint, Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Installs the toolchain pinned in mise.toml (Node, pnpm and a full FFmpeg
      # build with the drawtext filter + ffprobe that the tests require).
      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version
          ffmpeg -hide_banner -filters | grep drawtext

      - name: Install Dependencies
        run: pnpm i

      - name: Lint
        run: pnpm lint

      - name: Check Dependencies
        run: pnpm deps:check

      - name: Build
        run: pnpm build

      - name: Run Tests and Collect Coverage
        run: pnpm test:ci

