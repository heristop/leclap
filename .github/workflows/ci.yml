name: Continuous Integration

on:
  # Only run on direct pushes to main — feature branches run via the pull_request event,
  # so pushing to a branch with an open PR no longer triggers the workflow twice.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit lands on the same ref (PR or branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Run Lint, Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # The library/sample media (creative-kit videos/music, bundled Expo assets, and the
      # ffmpeg-engine probe fixture the MCP probe_media test ffprobes) lives in Git LFS; the default
      # checkout leaves pointer files, which ffprobe rejects with "analysis failed". Pull only the
      # source media the tests actually read — NOT the app's public/ clips — to keep LFS bandwidth down.
      - name: Fetch test media (Git LFS)
        run: git lfs pull --include="packages/leclap-creative-kit/src/library/,apps/leclap-expo/assets/,packages/ffmpeg-engine/tests/fixtures/"

      # Installs the toolchain pinned in mise.toml (Node, pnpm and a full FFmpeg
      # build with the drawtext filter + ffprobe that the tests require).
      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version
          ffmpeg -hide_banner -filters | grep drawtext

      - name: Install Dependencies
        run: pnpm i

      # Type-aware lint resolves `ffmpeg-video-composer/*` through its built dist and imports the
      # server template JSONs copied into the Expo app — both are generated, so produce them before
      # linting (otherwise the modules resolve to `any` and cascade into ~20 false errors).
      - name: Prepare workspace
        run: |
          pnpm --filter ffmpeg-video-composer build
          node scripts/copy-core-assets.ts

      - name: Lint
        run: pnpm lint -f stylish

      - name: Check Dependencies
        run: pnpm deps:check

      - name: Build
        run: pnpm build

      - name: Run Tests and Collect Coverage
        run: pnpm test:ci

      # The Expo app's unit suite runs on jest (not vitest), so the root vitest run above doesn't
      # include it. Run it explicitly so CI covers the whole monorepo (Build precedes this, so its
      # core-dist + copied-template imports resolve).
      - name: Run Expo App Tests
        run: pnpm --filter @leclap/expo test

      # Cucumber BDD integration: real renders through the core and the MCP server over stdio.
      # Needs the drawtext-capable FFmpeg set up above; each suite builds its own package first.
      - name: Run Integration Tests
        run: pnpm test:integration

  rust-engine:
    name: Rust engine (host FFmpeg + cargo test)
    # macOS runner: the engine build scripts target macOS (sysctl/DYLD, system pkg-config), and
    # macOS minutes are free on this public repo.
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # cli.rs renders from tests/fixtures/sample.mp4, which is stored in Git LFS; the default
      # checkout leaves a pointer file that ffmpeg can't decode. Pull just that fixture dir.
      - name: Fetch test fixtures (Git LFS)
        run: git lfs pull --include="packages/ffmpeg-engine/tests/fixtures/"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # build-host.sh statically links FFmpeg + freetype/harfbuzz/openh264/libvpx via pkg-config (full
      # build with drawtext + WebM/VP9-alpha decode). On the macOS runner those libraries come from
      # Homebrew; each ships a .pc on the default pkg-config path (libvpx is not keg-only).
      - name: Install FFmpeg build deps (Homebrew)
        run: brew install pkg-config freetype harfbuzz openh264 libvpx

      # Cache the FFmpeg source checkout + the built host libs so FFmpeg isn't recompiled from source
      # on every run. Keyed on the version pins + build scripts; the generated .pc prefixes are
      # absolute, so the cache only restores correctly to the same (stable per-repo) workspace path.
      - name: Cache host FFmpeg build
        uses: actions/cache@v4
        with:
          path: |
            scripts/ffmpeg/.work
            scripts/ffmpeg/dist/host
          key: ffmpeg-host-${{ runner.os }}-${{ hashFiles('scripts/ffmpeg/versions.env', 'scripts/ffmpeg/common.sh', 'scripts/ffmpeg/build-host.sh', 'scripts/ffmpeg/patch-fftools.sh') }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/ffmpeg-engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/ffmpeg-engine/Cargo.lock') }}

      # Build the static host FFmpeg + libfftools.a only on a cache miss.
      - name: Build host FFmpeg
        run: |
          if [ ! -f scripts/ffmpeg/dist/host/lib/libfftools.a ]; then
            bash scripts/ffmpeg/build-host.sh
          else
            echo "host FFmpeg present (cached) — skipping rebuild"
          fi

      # Runs the cli.rs execution tests (real in-process ffmpeg/ffprobe via the embedded fftools).
      # Re-entrancy guard: the engine embeds fftools in-process and resets their globals at every
      # ffmpeg_main entry (the leclap-reentrancy patch in patch-fftools.sh). `--test-threads=1` forces
      # run/probe/cancel to share one process sequentially, so run_is_reentrant_across_calls and
      # run_recovers_after_a_failed_run actually exercise that reset — if the patch ever silently stops
      # matching upstream, CI fails here rather than shipping a one-shot engine. Also covers the
      # fd-restore (panic safety) and cancel tests in the same run.
      - name: Cargo test (engine re-entrancy guard)
        working-directory: packages/ffmpeg-engine
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/scripts/ffmpeg/dist/host/lib/pkgconfig
          # build.rs reads FFMPEG_PKG_CONFIG_PATH, but the pkg-config crate reads PKG_CONFIG_PATH —
          # pin both to the dist so Homebrew's own ffmpeg .pc can't leak in and break the static link
          # (undefined Wels*/avcodec symbols).
          PKG_CONFIG_PATH: ${{ github.workspace }}/scripts/ffmpeg/dist/host/lib/pkgconfig
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/scripts/ffmpeg/dist/host/lib
        run: cargo test --release -- --test-threads=1
