name: Release

# Changesets-driven release. On every push to main this either:
#   1. opens/updates a "Version Packages" PR (when unreleased changesets exist), or
#   2. publishes the bumped packages to npm + creates GitHub releases (when that PR is merged).
# See .changeset/ for the workflow and CONTRIBUTING for how to add a changeset.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Changesets needs full history to diff against the base branch and tag releases.
          fetch-depth: 0

      # The bundled creative-kit media (templates/music) is embedded into the published
      # package at build time and lives in Git LFS; pull it before building.
      - name: Fetch bundled media (Git LFS)
        run: git lfs pull --include="packages/leclap-creative-kit/src/library/"

      # Toolchain pinned in mise.toml (Node, pnpm).
      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Install Dependencies
        run: pnpm i

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
