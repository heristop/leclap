<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="LeClap">
  <defs>
    <linearGradient id="lcg" x1="110" y1="90" x2="490" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C3C7FF"/>
      <stop offset="1" stop-color="#FFCFDE"/>
    </linearGradient>
    <pattern id="lcs" width="96" height="96" patternUnits="userSpaceOnUse" patternTransform="rotate(-26)">
      <rect width="96" height="96" fill="#FEF0A6"/>
      <rect x="48" width="48" height="96" fill="#8C80D8"/>
    </pattern>
    <!-- soft gradient for the pink body: lighter top → deeper bottom -->
    <linearGradient id="lcBoard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFA0B7"/>
      <stop offset="1" stop-color="#EE6184"/>
    </linearGradient>
    <!-- metallic gold ring: lighter at top, deeper at bottom -->
    <linearGradient id="lcRing" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF0A0"/>
      <stop offset="0.55" stop-color="#FFE45E"/>
      <stop offset="1" stop-color="#EFC23C"/>
    </linearGradient>
    <!-- glossy top sheen on the disc -->
    <radialGradient id="lcSheen" cx="0.5" cy="0.16" r="0.6">
      <stop stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- soft dark glow so the clapper separates from the matching gradient -->
    <filter id="lsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1C1540" flood-opacity="0.32"/>
    </filter>
  </defs>
  <!-- full-bleed gradient (opaque) so the app-icon circle/squircle is filled, not just the disc -->
  <rect width="600" height="600" fill="url(#lcg)"/>
  <!-- glossy top sheen + metallic gold ring near the edge -->
  <circle cx="300" cy="300" r="286" fill="url(#lcSheen)"/>
  <circle cx="300" cy="300" r="284" fill="none" stroke="url(#lcRing)" stroke-width="26"/>
  <g transform="translate(300 300) scale(0.68) translate(-298 -304)" filter="url(#lsh)">
    <!-- board -->
    <rect x="96" y="302" width="408" height="194" rx="40" fill="url(#lcBoard)" stroke="#5E51AC" stroke-width="24" stroke-linejoin="round"/>
    <!-- bottom clap -->
    <rect x="132" y="252" width="372" height="58" rx="18" fill="url(#lcs)" stroke="#5E51AC" stroke-width="24" stroke-linejoin="round"/>
    <!-- top clap (above the bottom clap) -->
    <g transform="rotate(-25 140 250)">
      <rect x="132" y="192" width="372" height="58" rx="18" fill="url(#lcs)" stroke="#5E51AC" stroke-width="24" stroke-linejoin="round"/>
    </g>
    <!-- hinge wedge: rounded vertical rect (1:1.2) on top, dot centered -->
    <rect x="90" y="216" width="80" height="96" rx="24" fill="url(#lcBoard)" stroke="#5E51AC" stroke-width="24" stroke-linejoin="round"/>
    <circle cx="130" cy="264" r="17" fill="#FFF6D0" stroke="#5E51AC" stroke-width="6"/>
  </g>
</svg>
