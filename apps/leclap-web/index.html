<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>LeClap — Cinematic Video Composer in Your Browser</title>
    <meta
      name="description"
      content="Create cinematic videos from templates right in your browser. LeClap runs client-side with WebAssembly and FFmpeg — no uploads, no servers, no limits."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0b0b0f" />
    <link rel="canonical" href="https://leclap.pages.dev/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LeClap" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LeClap" />
    <meta property="og:title" content="LeClap — Cinematic Video Composer in Your Browser" />
    <meta
      property="og:description"
      content="Build cinematic videos from templates entirely in your browser. Powered by WebAssembly and FFmpeg — no uploads, no servers, no limits."
    />
    <meta property="og:url" content="https://leclap.pages.dev/" />
    <meta property="og:image" content="https://leclap.pages.dev/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LeClap — cinematic video composer running in the browser" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LeClap — Cinematic Video Composer in Your Browser" />
    <meta
      name="twitter:description"
      content="Build cinematic videos from templates entirely in your browser. Powered by WebAssembly and FFmpeg — no uploads, no servers, no limits."
    />
    <meta name="twitter:image" content="https://leclap.pages.dev/og-image.jpg" />
    <meta name="twitter:image:alt" content="LeClap — cinematic video composer running in the browser" />

    <!-- Fonts: Oswald is the primary UI face and is self-hosted (see @font-face in index.css), so we
         preload it on the critical path instead of pulling a render-blocking Google Fonts stylesheet —
         which also avoids an external request the COEP: require-corp policy would otherwise gate. -->
    <link rel="preload" href="/fonts/Oswald.woff2" as="font" type="font/woff2" crossorigin />

    <!-- The hero's full-bleed clapperboard texture is the LCP element, but only on the home route. A
         static <link rel="preload"> in this shared shell would fetch it on every page and log a
         "preloaded but unused" warning off-home — so inject it from an inline head script only when the
         path is a home root (root or a locale prefix). Still in <head> and synchronous, so on home it
         races ahead of the CSS that references the background. -->
    <script>
      (function () {
        var p = location.pathname.replace(/\/$/, '') || '/';
        var homeRoots = ['/', '/fr', '/de', '/es', '/it'];
        if (homeRoots.indexOf(p) === -1) return;
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.setAttribute('fetchpriority', 'high');
        link.href = '/images/hero-texture.webp';
        document.head.appendChild(link);
      })();
    </script>

    <!-- Structured data: the web app itself -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LeClap",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (modern web browser)",
        "url": "https://leclap.pages.dev/",
        "description": "A cinematic video composer that runs entirely in the browser, building videos from templates with WebAssembly and FFmpeg — no servers or uploads.",
        "browserRequirements": "Requires a browser with WebAssembly support",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!-- Apply the theme before paint to avoid a flash of the wrong one. Default is the OS color
         scheme; a saved choice (only written when the user toggles) overrides it. -->
    <script>
      (function () {
        var stored = null;
        try {
          stored = localStorage.getItem('leclap-theme');
        } catch (e) {
          /* storage blocked — fall through to the system preference */
        }
        var prefersDark = globalThis.matchMedia && globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (stored !== 'light' && prefersDark);
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
