[tools]
node = "24"
pnpm = "11"

# Rust toolchain for the on-device FFmpeg engine crate (leclap-ffmpeg-core: rsmpeg + uniffi).
rust = "stable"

# conda-forge build (full): includes the drawtext filter + ffprobe required by the
# director's text/intertitle/background-color segments. Homebrew's split `ffmpeg`
# formula drops libfreetype, so drawtext is unavailable there.
ffmpeg = "8.1.1"
